apis:

  - aid: datafold:datafold-rest-api
    name: Datafold REST API
    description: The Datafold REST API provides programmatic access to data diffs, data sources, CI runs, BI integrations, audit logs, and monitors. Authenticate using an API key passed as a header. The API enables creating and retrieving data diffs, managing data sources, listing CI pipeline runs, and accessing audit logs.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
