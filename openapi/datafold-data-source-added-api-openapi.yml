          format: password
          title: Password
          type: string
          writeOnly: true
        pool_size:
          default: 1
          description: Number of connections in pool
          title: Pool Size
          type: integer
        port:
          default: 50000
          description: DB2 server port
          title: Port
          type: integer
        ssl:
          default: false
          description: Enable SSL connection
          title: Ssl
          type: boolean
        ssl_certificate:
          anyOf:
